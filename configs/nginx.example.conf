# Sample nginx/Angie configuration for the ratelimiter service.
#
# The original URI of the parent request is passed to the ratelimiter
# via X-Original-URI; the ratelimiter parses api_key / token out of the
# query string itself. This avoids the well-known auth_request quirk:
# $args / $arg_* in the auth subrequest are empty (NULL args, see
# nginx#761), so map-based extraction does not work in some nginx/Angie
# builds. $request_uri *is* preserved across auth_request, which makes
# this approach robust.
#
# Note: ratelimiter returns 403 (not 429) on block, because nginx/Angie's
# auth_request module only forwards 2xx / 401 / 403 statuses to the
# parent request — anything else is converted to 500. We catch the 403
# with `error_page 403 = @ratelimit_*` and rewrite to a custom 200.
#
# Socket path matches the .deb package layout (RuntimeDirectory=ratelimiter
# → /run/ratelimiter/ratelimit.sock). Adjust if you run the binary by hand.
#
# Operational model for "disable rate-limiting":
#   * Planned (maintenance, deploy, config reload of ratelimiter):
#       `systemctl stop ratelimiter` → unix socket goes away → nginx
#       fails the upstream over to the in-nginx stub (see below). No
#       nginx reload needed. `systemctl start ratelimiter` brings it
#       back automatically after `fail_timeout`.
#   * Per-request exemption (internal monitoring, allow-listed keys/
#       IPs, …): extend the `$ratelimit_upstream` map to route specific
#       traffic straight to the `ratelimiter_bypass` upstream — see
#       the map block below.

# Required because proxy_pass below uses a variable. Lookups always
# resolve via upstream{} blocks, never DNS, but nginx still requires the
# directive to be present whenever proxy_pass contains a variable.
resolver 127.0.0.1 valid=300s ipv6=off;

upstream php_api {
    server 127.0.0.1:9000;   # adjust at deploy time
    keepalive 32;
}

# Real ratelimiter + in-nginx stub as backup. nginx detects a dead
# unix socket on the first failed connect (max_fails=1) and stops
# trying for `fail_timeout`, routing to the backup in the meantime.
# When the service is back, the next probe after fail_timeout succeeds
# and traffic returns to primary.
upstream ratelimiter {
    server unix:/run/ratelimiter/ratelimit.sock max_fails=1 fail_timeout=2s;
    server unix:/run/ratelimiter-stub.sock backup;
    keepalive 32;
}

# Bypass upstream: only the stub. Picked via the $ratelimit_upstream
# map below when a request is explicitly exempted from rate limiting.
upstream ratelimiter_bypass {
    server unix:/run/ratelimiter-stub.sock;
    keepalive 8;
}

# In-nginx stub: always answers 200 to /check on a unix socket. Hosted
# inside this same nginx process — no second daemon, no extra systemd
# unit. Used both as the backup arm of `ratelimiter` (auto fail-open
# when the service is down) and as the only arm of `ratelimiter_bypass`
# (explicit per-request skip).
#
# Note on socket permissions: nginx's master (typically root) creates
# the listening socket. If your distro runs workers under a different
# user (Debian: www-data), pre-create the parent directory with
# systemd-tmpfiles so worker→stub connect() succeeds:
#   /etc/tmpfiles.d/ratelimiter-stub.conf:
#       d /run/ratelimiter-stub 0755 www-data www-data -
# and adjust the path below to `/run/ratelimiter-stub/sock`.
server {
    listen unix:/run/ratelimiter-stub.sock;
    access_log /var/log/nginx/ratelimit-bypass.log;
    location / {
        return 200;
    }
}

# Single switch: pick which upstream serves /_ratelimit.
#   default  → `ratelimiter`         (full rate-limiting; stub used only as backup)
#   "skip"   → `ratelimiter_bypass`  (stub only; request unconditionally allowed)
#
# Placeholder body — operator wires real conditions in. Examples:
#
#   # Exempt requests that carry a specific api_key:
#   map $arg_api_key $ratelimit_upstream {
#       default            ratelimiter;
#       "internal-monitor" ratelimiter_bypass;
#   }
#
#   # Exempt traffic from internal networks:
#   map $remote_addr $ratelimit_upstream {
#       default      ratelimiter;
#       ~^10\.       ratelimiter_bypass;
#       ~^192\.168\. ratelimiter_bypass;
#   }
#
# To compose several conditions, chain maps: each map sets an
# intermediate variable, and a final map picks the upstream.
map $request_uri $ratelimit_upstream {
    default ratelimiter;
}

# Optional: ratelimiter admin port (--admin-listen, default 127.0.0.1:8080).
# Bound to localhost in the systemd unit, so this upstream block is the
# only way it gets exposed externally. Uncomment together with the
# /admin-XXXXXXXXXXXX/ location below.
#
#upstream ratelimiter_admin {
#    server 127.0.0.1:8080;
#    keepalive 8;
#}

server {
    listen 80;
    server_name api.example.com;

    # ── Optional: ratelimiter admin (hidden URL + IP allowlist) ───────
    #
    # Replace XXXXXXXXXXXX with a random token (e.g. `openssl rand -hex 8`).
    # The token must appear in FOUR places below: the location pattern
    # and the three sub_filter replacements. Without the token in the URL
    # the admin is invisible — requests fall through to other locations.
    #
    # sub_filter rewrites are required because admin templates emit
    # absolute paths in href / action / formaction. Without them the
    # navigation links and the Delete/Purge POSTs would point at the
    # bare paths (/, /limits, /limits/delete, /limits/purge, ...) and
    # 404 outside the token prefix.
    #
    #location /admin-XXXXXXXXXXXX/ {
    #    # Force HTTPS — admin pages may surface api keys and IPs.
    #    if ($scheme = "http") {
    #        return 301 https://$host$request_uri;
    #    }
    #
    #    # IP allowlist — adjust to your operator network.
    #    allow 192.168.1.0/24;   # office
    #    allow 10.0.0.5;         # ops bastion
    #    deny  all;
    #
    #    # Cap admin POST bodies. Delete/Purge forms carry only checkbox
    #    # selections + a CSRF token, so a few hundred KB is plenty;
    #    # the ratelimiter Go process doesn't enforce its own body limit,
    #    # so this is the enforcement point.
    #    client_max_body_size    256k;
    #
    #    proxy_pass              http://ratelimiter_admin/;
    #    proxy_set_header        Host       $host;
    #    proxy_set_header        X-Real-IP  $remote_addr;
    #    proxy_connect_timeout   500ms;
    #    proxy_read_timeout      5s;
    #
    #    sub_filter      'href="/'        'href="/admin-XXXXXXXXXXXX/';
    #    sub_filter      'action="/'      'action="/admin-XXXXXXXXXXXX/';
    #    sub_filter      'formaction="/'  'formaction="/admin-XXXXXXXXXXXX/';
    #    sub_filter_once off;
    #    sub_filter_types text/html;
    #}

    # Internal sub-request: ratelimiter receives only the headers it needs.
    # X-Original-URI carries the parent's full URI ($request_uri is one of
    # the few built-ins that survives auth_request), and ratelimiter pulls
    # api_key / token out of it server-side. api_key wins over token;
    # if neither is present the limiter falls back to X-Real-IP.
    #
    # The upstream is picked dynamically via $ratelimit_upstream — see
    # the map block at the top of this file. `proxy_next_upstream` is
    # what makes the failover automatic: on connect error/timeout to the
    # primary unix socket, nginx immediately tries the next server in
    # the upstream block (the backup stub for `ratelimiter`).
    location = /_ratelimit {
        internal;
        proxy_pass                http://$ratelimit_upstream/check;
        proxy_next_upstream       error timeout;
        proxy_next_upstream_tries 2;
        proxy_pass_request_body   off;
        proxy_set_header          Content-Length    "";
        proxy_set_header          X-Original-URI    $request_uri;
        proxy_set_header          X-Real-IP         $remote_addr;
        proxy_connect_timeout     100ms;
        proxy_read_timeout        200ms;
    }

    # ── Rate-limited endpoints ─────────────────────────────────────────

    location ~ ^/(control|premium)/get-number {
        auth_request  /_ratelimit;
        error_page 403 = @ratelimit_our;
        proxy_pass              http://php_api;
        proxy_pass_request_headers on;
    }

    location = /smshub/get-number {
        auth_request  /_ratelimit;
        error_page 403 = @ratelimit_smshub;
        proxy_pass              http://php_api;
        proxy_pass_request_headers on;
    }

    location = /stubs/handler_api.php {
        auth_request  /_ratelimit;
        error_page 403 = @ratelimit_stubs;
        proxy_pass              http://php_api;
        proxy_pass_request_headers on;
    }

    # ── Default location — no rate limiting ────────────────────────────
    location / {
        proxy_pass              http://php_api;
        proxy_pass_request_headers on;
    }

    # ── Custom rate-limit responses: 403 from ratelimiter → 200 with body
    location @ratelimit_our {
        default_type application/json;
        return 200 '{"error_code":"no_numbers","error_id":0,"error_msg":"No numbers, try again..."}';
    }

    location @ratelimit_smshub {
        default_type application/json;
        return 200 '{"status":"NO NUMBERS"}';
    }

    location @ratelimit_stubs {
        default_type text/plain;
        return 200 'NO NUMBERS';
    }
}
