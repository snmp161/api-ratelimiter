name: api-ratelimiter
arch: amd64
platform: linux
version: ${VERSION}
release: 1
section: net
priority: optional
maintainer: Infrastructure <infra@example.com>
description: |
  api-ratelimiter — HTTP rate limiter for API servers, called by
  nginx/Angie via auth_request. Provides a /check endpoint that returns
  200 / 403 based on per-key limits stored in Redis and in-memory
  fixed-window counters.
homepage: https://example.com/api-ratelimiter
license: Apache-2.0

depends:
  - adduser

contents:
  - src: ./api-ratelimiter
    dst: /usr/bin/api-ratelimiter
    file_info:
      mode: 0755
      owner: root
      group: root

  - src: ./configs/api-ratelimiter.service
    dst: /lib/systemd/system/api-ratelimiter.service
    file_info:
      mode: 0644
      owner: root
      group: root

scripts:
  postinstall: ./packaging/scripts/postinstall.sh
  preremove:   ./packaging/scripts/preremove.sh
  postremove:  ./packaging/scripts/postremove.sh
