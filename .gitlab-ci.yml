# GitLab CI for ratelimiter.
#
# Pipelines:
#   - on push / MR:  lint + test + build (verify only)
#   - on git tag v*: lint + test + build + publish (.deb, tarball)
#
# Adjust `tags:` below to your self-hosted runner labels.

stages:
  - verify
  - build
  - publish

variables:
  GO_VERSION:   "1.22"
  NFPM_VERSION: "v2.41.3"

default:
  tags: [docker]   # adjust to your runner tags

.go-cache: &go-cache
  cache:
    key:
      files: [go.sum]
    paths:
      - .gocache/
      - .gomodcache/
  variables:
    GOPATH:    "$CI_PROJECT_DIR/.gomodcache"
    GOCACHE:   "$CI_PROJECT_DIR/.gocache"
    GOFLAGS:   "-mod=readonly"

.rules-verify: &rules-verify
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG

.rules-tag: &rules-tag
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d/

# ───── verify ────────────────────────────────────────────────────────────

lint:
  stage: verify
  image: golangci/golangci-lint:v1.59-alpine
  <<: *go-cache
  script:
    - golangci-lint run --timeout=5m ./...
  <<: *rules-verify

test:
  stage: verify
  image: golang:${GO_VERSION}-alpine
  <<: *go-cache
  before_script:
    - apk add --no-cache git gcc musl-dev
  script:
    - go test -race -v ./...
  <<: *rules-verify

# ───── build ─────────────────────────────────────────────────────────────

build:
  stage: build
  image: golang:${GO_VERSION}-alpine
  <<: *go-cache
  before_script:
    - apk add --no-cache git
  script:
    - export VERSION="${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}"
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64
        go build -trimpath
        -ldflags="-X main.Version=${VERSION} -s -w"
        -o ratelimiter ./cmd/ratelimiter
    - ./ratelimiter --help 2>&1 | head -5 || true
  artifacts:
    paths: [ratelimiter]
    expire_in: 1 day
  <<: *rules-verify

# ───── publish (only on tag) ─────────────────────────────────────────────

deb:
  stage: publish
  image: golang:${GO_VERSION}-alpine
  needs: [build]
  before_script:
    - apk add --no-cache git curl ca-certificates
  script:
    - go install github.com/goreleaser/nfpm/v2/cmd/nfpm@${NFPM_VERSION}
    - export PATH="$PATH:$(go env GOPATH)/bin"
    - export VERSION="${CI_COMMIT_TAG#v}"
    - mkdir -p dist
    - nfpm pkg --packager deb
        --target "dist/ratelimiter_${VERSION}_amd64.deb"
        -f packaging/nfpm.yaml
    - (cd dist && sha256sum "ratelimiter_${VERSION}_amd64.deb"
        > "ratelimiter_${VERSION}_amd64.deb.sha256")
    - >
      curl --fail --silent --show-error
      --header "JOB-TOKEN: $CI_JOB_TOKEN"
      --upload-file "dist/ratelimiter_${VERSION}_amd64.deb"
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ratelimiter/${VERSION}/ratelimiter_${VERSION}_amd64.deb"
    - >
      curl --fail --silent --show-error
      --header "JOB-TOKEN: $CI_JOB_TOKEN"
      --upload-file "dist/ratelimiter_${VERSION}_amd64.deb.sha256"
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ratelimiter/${VERSION}/ratelimiter_${VERSION}_amd64.deb.sha256"
  artifacts:
    paths: [dist/*.deb, dist/*.sha256]
    expire_in: 30 days
  <<: *rules-tag

tarball:
  stage: publish
  image: alpine:3.19
  needs: [build]
  before_script:
    - apk add --no-cache curl ca-certificates
  script:
    - export TAG="${CI_COMMIT_TAG}"
    - export VERSION="${TAG#v}"
    - mkdir -p dist
    - tar czf "dist/ratelimiter-${TAG}-linux-amd64.tar.gz" ratelimiter
    - (cd dist && sha256sum "ratelimiter-${TAG}-linux-amd64.tar.gz"
        > "ratelimiter-${TAG}-linux-amd64.tar.gz.sha256")
    - >
      curl --fail --silent --show-error
      --header "JOB-TOKEN: $CI_JOB_TOKEN"
      --upload-file "dist/ratelimiter-${TAG}-linux-amd64.tar.gz"
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ratelimiter/${VERSION}/ratelimiter-${TAG}-linux-amd64.tar.gz"
    - >
      curl --fail --silent --show-error
      --header "JOB-TOKEN: $CI_JOB_TOKEN"
      --upload-file "dist/ratelimiter-${TAG}-linux-amd64.tar.gz.sha256"
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ratelimiter/${VERSION}/ratelimiter-${TAG}-linux-amd64.tar.gz.sha256"
  artifacts:
    paths: [dist/*.tar.gz, dist/*.sha256]
    expire_in: 30 days
  <<: *rules-tag

release:
  stage: publish
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: deb
    - job: tarball
  script:
    - export TAG="${CI_COMMIT_TAG}"
    - export VERSION="${TAG#v}"
    - >
      release-cli create
      --name "ratelimiter ${TAG}"
      --tag-name "${TAG}"
      --description "Automated release for ${TAG}. See pipeline ${CI_PIPELINE_URL}."
      --assets-link "{\"name\":\"ratelimiter ${TAG} amd64 .deb\",\"url\":\"${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ratelimiter/${VERSION}/ratelimiter_${VERSION}_amd64.deb\",\"link_type\":\"package\"}"
      --assets-link "{\"name\":\"ratelimiter ${TAG} linux/amd64 tar.gz\",\"url\":\"${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ratelimiter/${VERSION}/ratelimiter-${TAG}-linux-amd64.tar.gz\",\"link_type\":\"package\"}"
  <<: *rules-tag
