name: ci

on:
  push:
    branches: ['**']
    tags-ignore: ['**']
  pull_request:

# Cancel an in-flight run when a newer commit lands on the same ref.
# Saves CI minutes on rapid pushes / force-pushes during dev. Release
# workflow has its own group below without cancel-in-progress so tagged
# builds can't kill each other.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          args: --timeout=5m

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      # go vet is also called by golangci-lint, but a dedicated step
      # surfaces it as its own pass/fail in the Actions UI and makes
      # vet failures unambiguous (vs a lint job that bundles many
      # checks).
      - name: go vet
        run: go vet ./...

      - name: go test with coverage
        run: |
          go test -race -covermode=atomic -coverpkg=./... \
            -coverprofile=coverage.out -v ./...

      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | tee coverage-func.txt
          {
            echo "## Test coverage"
            echo ''
            echo '```'
            tail -1 coverage-func.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage-func.txt

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" \
            -o api-ratelimiter ./cmd/api-ratelimiter
          # Smoke test: verify the binary actually runs. pflag (and the
          # stdlib flag package) exit with code 2 on --help — both 0 and
          # 2 are "normal" outcomes here; anything else (segfault,
          # missing symbol, panic during init) fails the job. The
          # previous `| head -5 || true` swallowed every error.
          # `|| rc=$?` is needed because GitHub Actions runs scripts
          # under `bash -eo pipefail`, so an exit 2 would otherwise kill
          # the step before we get to inspect it.
          rc=0
          ./api-ratelimiter --help > /dev/null || rc=$?
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ]; then
            echo "api-ratelimiter --help exited with unexpected code: $rc"
            exit 1
          fi

  # Integration tests: spawn the real binary, hit it via unix socket
  # + admin HTTP + miniredis. See docs/specification.md §17.2 for the
  # full plan; build-tag gated so `go test ./...` stays fast.
  # needs: [test] — don't burn CI minutes on integration if the unit
  # suite is already broken.
  integration:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: integration tests
        run: go test -tags=integration -timeout=10m -v ./test/integration/...
