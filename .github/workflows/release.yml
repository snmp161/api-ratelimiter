name: release

on:
  push:
    tags: ['v*']

# Serialise tag builds so two near-simultaneous tags don't race. No
# cancel-in-progress here — every tagged release must complete; killing
# a partial release would leave inconsistent artifacts.
concurrency:
  group: release-${{ github.ref }}

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          args: --timeout=5m

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - run: go test -race ./...

  artifacts:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - id: vars
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "version_num=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG}"       >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-X main.Version=${VERSION} -s -w" \
            -o ratelimiter ./cmd/ratelimiter

      - name: Package tarball
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          mkdir -p dist
          tar czf "dist/ratelimiter-${VERSION}-linux-amd64.tar.gz" ratelimiter
          (cd dist && sha256sum "ratelimiter-${VERSION}-linux-amd64.tar.gz" \
            > "ratelimiter-${VERSION}-linux-amd64.tar.gz.sha256")

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.41.3

      - name: Build .deb
        env:
          VERSION: ${{ steps.vars.outputs.version_num }}
        run: |
          nfpm pkg --packager deb --target "dist/ratelimiter_${VERSION}_amd64.deb" \
            -f packaging/nfpm.yaml
          (cd dist && sha256sum "ratelimiter_${VERSION}_amd64.deb" \
            > "ratelimiter_${VERSION}_amd64.deb.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    needs: artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.deb
            dist/*.deb.sha256
          generate_release_notes: true
