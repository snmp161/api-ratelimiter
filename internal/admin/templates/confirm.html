{{template "head" .}}
<h1>{{.Title}}</h1>
<div class="warn-banner">{{.Message}}</div>
<form method="post" action="{{.Action}}">
  <input type="hidden" name="confirm" value="yes">
  <button type="submit" class="btn-danger">{{.ConfirmLabel}}</button>
  <a href="{{.BackTo}}" class="btn-cancel">Cancel</a>
</form>
{{template "tail" .}}
